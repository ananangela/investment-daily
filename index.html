<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>æè³æ¥å ± Â· æ¯æ¥ä¸å</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;500;700&family=Noto+Sans+TC:wght@300;400;500&family=DM+Serif+Display&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --ink:              #1a1a1a;
      --ink-light:        #4a4a4a;
      --ink-faint:        #888;
      --paper:            #faf9f6;
      --paper-warm:       #f3f0e8;
      --rule:             #d4cfc4;
      --accent:           #c8a96e;
      --accent-dark:      #a07840;
      --tag-stock-bg:     #e8f0e8;
      --tag-stock-fg:     #2d6a2d;
      --tag-etf-bg:       #e8ecf4;
      --tag-etf-fg:       #1e3a6e;
      --tag-industry-bg:  #f4ece8;
      --tag-industry-fg:  #6e2e1e;
      --highlight:        #fffbe6;

      /* Font scale â 16px is the absolute floor for readable content */
      --f-deco:  13px;   /* purely ornamental: volume tag, separator labels   */
      --f-meta:  14px;   /* timestamps, chips, nav, tags, footer disclaimer   */
      --f-body:  16px;   /* body text baseline                                */
      --f-md:    17px;   /* article deck, descriptions                        */
      --f-sub:   20px;   /* sub-headlines, section titles                     */
      --f-head:  26px;   /* archive card headlines                            */
      --f-hero:  34px;   /* featured article headline                         */
      --f-date:  52px;   /* date numeral in navigator                         */
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      background: var(--paper);
      color: var(--ink);
      font-family: 'Noto Sans TC', sans-serif;
      font-weight: 300;
      font-size: var(--f-body);
      line-height: 1.8;
      min-height: 100vh;
    }

    /* âââ MASTHEAD ââââââââââââââââââââââââââââ */
    .masthead {
      border-bottom: 3px double var(--ink);
      padding: 36px 0 22px;
      text-align: center;
    }
    .masthead-vol {
      font-size: var(--f-deco);
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--ink-faint);
      margin-bottom: 12px;
    }
    .masthead-title {
      font-family: 'DM Serif Display', 'Noto Serif TC', serif;
      font-size: clamp(42px, 9vw, 72px);
      font-weight: 400;
      letter-spacing: -0.02em;
      line-height: 1;
      margin-bottom: 10px;
    }
    .masthead-title em { font-style: normal; color: var(--accent-dark); }
    .masthead-tagline {
      font-size: var(--f-meta);
      letter-spacing: 0.22em;
      color: var(--ink-light);
      text-transform: uppercase;
    }
    .masthead-orn {
      display: flex; align-items: center; gap: 16px;
      padding: 14px 48px 0; justify-content: center;
    }
    .masthead-orn-line { flex: 1; max-width: 100px; height: 1px; background: var(--rule); }
    .masthead-orn span { font-size: var(--f-deco); color: var(--accent); letter-spacing: 0.4em; }

    /* âââ NAV STRIP âââââââââââââââââââââââââââ */
    .nav-strip {
      border-bottom: 1px solid var(--rule);
      padding: 12px 0;
      background: var(--paper);
      position: sticky; top: 0; z-index: 50;
    }
    .container { max-width: 900px; margin: 0 auto; padding: 0 24px; }
    .nav-inner {
      display: flex; gap: 8px; align-items: center;
      overflow-x: auto; scrollbar-width: none;
    }
    .nav-inner::-webkit-scrollbar { display: none; }
    .nav-label {
      font-size: var(--f-deco);
      letter-spacing: 0.18em; text-transform: uppercase;
      color: var(--ink-faint); white-space: nowrap; flex-shrink: 0;
    }
    .nav-chip {
      padding: 5px 16px; border-radius: 20px;
      font-size: var(--f-meta); white-space: nowrap;
      cursor: pointer; border: 1px solid transparent;
      transition: all 0.2s; text-decoration: none; font-weight: 400;
      background: none; font-family: inherit;
    }
    .nav-chip.all      { background: var(--ink); color: var(--paper); }
    .nav-chip.stock    { background: var(--tag-stock-bg); color: var(--tag-stock-fg); border-color: #b8d4b8; }
    .nav-chip.etf      { background: var(--tag-etf-bg);   color: var(--tag-etf-fg);   border-color: #b8c4d8; }
    .nav-chip.industry { background: var(--tag-industry-bg); color: var(--tag-industry-fg); border-color: #d4b8ac; }
    .nav-chip:hover { filter: brightness(0.94); }
    /* Active state: thicker border + slight shadow to signal selection */
    .nav-chip.chip-active { box-shadow: 0 0 0 2px var(--ink); font-weight: 500; }
    .nav-chip.all.chip-active { box-shadow: 0 0 0 2px #555; }

    /* âââ DAY NAVIGATOR âââââââââââââââââââââââ */
    .day-nav {
      display: flex; align-items: center;
      justify-content: space-between; gap: 16px;
      padding: 36px 0 26px;
      border-bottom: 1px solid var(--rule);
      margin-bottom: 40px;
    }
    .day-nav-btn {
      display: flex; align-items: center; gap: 8px;
      padding: 10px 18px;
      border: 1px solid var(--rule); background: white;
      cursor: pointer; font-size: var(--f-meta);
      color: var(--ink-light); font-family: inherit;
      letter-spacing: 0.06em; transition: all 0.18s;
      border-radius: 2px; white-space: nowrap;
    }
    .day-nav-btn:hover:not(:disabled) { background: var(--ink); color: var(--paper); border-color: var(--ink); }
    .day-nav-btn:disabled { opacity: 0.3; cursor: default; }
    .day-nav-center { text-align: center; }
    .day-nav-big {
      font-family: 'DM Serif Display', serif;
      font-size: var(--f-date); line-height: 1; font-weight: 400;
    }
    .day-nav-weekday {
      font-family: 'Noto Serif TC', serif;
      font-size: var(--f-sub); font-weight: 500; color: var(--ink);
    }
    .day-nav-month { font-size: var(--f-meta); color: var(--ink-faint); letter-spacing: 0.08em; margin-top: 4px; }
    .today-pill {
      display: inline-block;
      background: var(--accent); color: white;
      font-size: var(--f-deco); letter-spacing: 0.12em;
      padding: 2px 10px; border-radius: 2px; margin-top: 6px; font-weight: 500;
    }

    /* âââ ARTICLE AREA ââââââââââââââââââââââââ */
    #article-wrap { transition: opacity 0.25s ease, transform 0.25s ease; }
    #article-wrap.fading { opacity: 0; transform: translateY(8px); }

    .article-kicker {
      display: flex; align-items: center; gap: 10px; margin-bottom: 14px;
    }
    .kicker-txt {
      font-size: var(--f-deco); letter-spacing: 0.24em;
      text-transform: uppercase; color: var(--accent-dark); font-weight: 500;
    }
    .kicker-line { width: 36px; height: 1px; background: var(--accent); }

    .article-headline {
      font-family: 'Noto Serif TC', serif;
      font-size: clamp(22px, 4vw, var(--f-hero));
      font-weight: 700; line-height: 1.4;
      margin-bottom: 14px; letter-spacing: -0.01em;
    }
    .article-deck {
      font-size: var(--f-md); color: var(--ink-light); line-height: 1.8; margin-bottom: 18px;
    }
    .article-meta {
      display: flex; align-items: center; flex-wrap: wrap;
      gap: 12px; font-size: var(--f-meta); color: var(--ink-faint); margin-bottom: 22px;
    }
    .meta-sep { color: var(--rule); }

    .tag-list { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 32px; }
    .tag {
      padding: 4px 12px; border-radius: 3px;
      font-size: var(--f-meta); font-weight: 500; letter-spacing: 0.04em;
    }
    .tag.stock    { background: var(--tag-stock-bg);    color: var(--tag-stock-fg); }
    .tag.etf      { background: var(--tag-etf-bg);      color: var(--tag-etf-fg); }
    .tag.industry { background: var(--tag-industry-bg); color: var(--tag-industry-fg); }

    /* âââ TWO-COL ââââââââââââââââââââââââââââââ */
    .two-col {
      display: grid; grid-template-columns: 1fr 1fr; gap: 24px; margin-bottom: 40px;
    }
    @media (max-width: 640px) { .two-col { grid-template-columns: 1fr; } }

    .section-block {
      background: white; border: 1px solid var(--rule);
      border-radius: 2px; padding: 24px; position: relative;
    }
    .section-block::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0;
      height: 3px; background: var(--ink); border-radius: 2px 2px 0 0;
    }
    .block-label {
      font-size: var(--f-deco); letter-spacing: 0.22em; text-transform: uppercase;
      color: var(--ink-faint); margin-bottom: 16px; font-weight: 500;
    }

    .summary-text {
      font-family: 'Noto Serif TC', serif; font-size: var(--f-body); line-height: 2;
    }
    .summary-text strong { font-weight: 700; border-bottom: 2px solid var(--accent); }

    .kp-list { list-style: none; display: flex; flex-direction: column; gap: 14px; }
    .kp-item { display: flex; gap: 12px; align-items: flex-start; }
    .kp-num {
      flex-shrink: 0; width: 24px; height: 24px;
      background: var(--ink); color: var(--paper);
      border-radius: 50%; display: flex; align-items: center; justify-content: center;
      font-size: var(--f-meta); font-weight: 500; margin-top: 2px;
    }
    .kp-txt { font-size: var(--f-body); line-height: 1.8; color: var(--ink-light); }

    /* âââ GLOSSARY ââââââââââââââââââââââââââââ */
    .glossary-sec { margin-bottom: 40px; }
    .glossary-hd {
      display: flex; align-items: baseline; gap: 14px; margin-bottom: 20px;
    }
    .glossary-lbl {
      font-size: var(--f-deco); letter-spacing: 0.22em; text-transform: uppercase;
      color: var(--ink-faint); font-weight: 500; white-space: nowrap;
    }
    .glossary-rule { flex: 1; height: 1px; background: var(--rule); }
    .glossary-hint { font-size: var(--f-meta); color: var(--ink-faint); white-space: nowrap; }
    .glossary-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(230px, 1fr)); gap: 12px;
    }

    .term-card {
      background: white; border: 1px solid var(--rule);
      border-radius: 2px; padding: 20px; cursor: pointer;
      transition: box-shadow 0.22s, transform 0.22s; position: relative; overflow: hidden;
    }
    .term-card::after {
      content: ''; position: absolute; bottom: 0; left: 0; right: 0;
      height: 2px; background: var(--accent);
      transform: scaleX(0); transition: transform 0.22s; transform-origin: left;
    }
    .term-card:hover { box-shadow: 0 4px 18px rgba(0,0,0,0.08); transform: translateY(-2px); }
    .term-card:hover::after, .term-card.open::after { transform: scaleX(1); }
    .term-card.open { background: var(--highlight); border-color: var(--accent); }

    .term-name { font-family: 'Noto Serif TC', serif; font-size: var(--f-sub); font-weight: 700; margin-bottom: 3px; }
    .term-en { font-family: 'Inter', sans-serif; font-size: var(--f-deco); letter-spacing: 0.1em; color: var(--ink-faint); text-transform: uppercase; margin-bottom: 12px; }
    .term-short { font-size: var(--f-body); color: var(--ink-light); line-height: 1.7; }
    .term-card:not(.open) .term-short {
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
    }
    .term-full { display: none; margin-top: 14px; padding-top: 14px; border-top: 1px dashed var(--rule); }
    .term-card.open .term-full { display: block; }
    .term-full-txt { font-size: var(--f-body); line-height: 1.85; color: var(--ink); }
    .term-eg {
      margin-top: 10px; padding: 10px 14px;
      background: var(--paper-warm); border-left: 3px solid var(--accent);
      font-size: var(--f-body); color: var(--ink-light); font-style: italic; line-height: 1.75;
    }
    .term-hint {
      font-size: var(--f-deco); color: var(--accent-dark);
      margin-top: 10px; text-align: right; letter-spacing: 0.08em;
    }
    .term-card.open .term-hint { display: none; }

    /* âââ DIVIDER ââââââââââââââââââââââââââââââ */
    .orn { display: flex; align-items: center; gap: 18px; margin: 40px 0; }
    .orn-line { flex: 1; height: 1px; background: var(--rule); }
    .orn-sym { color: var(--accent); font-size: var(--f-meta); letter-spacing: 0.3em; }

    /* âââ ARCHIVE ââââââââââââââââââââââââââââââ */
    .archive-sec { margin-bottom: 60px; }
    .archive-hd { display: flex; align-items: baseline; gap: 14px; margin-bottom: 24px; }
    .archive-title { font-family: 'Noto Serif TC', serif; font-size: var(--f-sub); font-weight: 700; }
    .archive-rule { flex: 1; height: 1px; background: var(--rule); }

    .archive-list { display: flex; flex-direction: column; }
    .archive-card {
      display: grid; grid-template-columns: 1fr auto; gap: 20px;
      align-items: start; padding: 22px 0;
      border-bottom: 1px solid var(--rule);
      cursor: pointer; transition: background 0.15s, margin 0.15s, padding 0.15s;
      border-radius: 2px; text-decoration: none; color: inherit;
    }
    .archive-card:hover { background: white; margin: 0 -18px; padding: 22px 18px; }
    .archive-card-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; }
    .archive-card-hl {
      font-family: 'Noto Serif TC', serif;
      font-size: var(--f-head); font-weight: 500; line-height: 1.45; margin-bottom: 8px;
    }
    .archive-card-deck { font-size: var(--f-body); color: var(--ink-light); line-height: 1.7; }
    .archive-card-meta { display: flex; flex-direction: column; align-items: flex-end; gap: 8px; flex-shrink: 0; }
    .archive-card-date { font-size: var(--f-meta); color: var(--ink-faint); }
    .diff {
      display: inline-flex; align-items: center;
      padding: 3px 10px; border-radius: 3px; font-size: var(--f-meta); font-weight: 500;
    }
    .diff.beginner    { background: #e8f5e8; color: #2d6a2d; }
    .diff.intermediate { background: #fff3e0; color: #8a4500; }

    /* âââ QUIZ FAB âââââââââââââââââââââââââââââ */
    .quiz-fab {
      position: fixed; bottom: 32px; right: 28px; z-index: 200;
      display: flex; align-items: center; gap: 8px;
      padding: 14px 22px;
      background: var(--ink); color: var(--paper);
      border: none; border-radius: 40px; cursor: pointer;
      font-family: 'Noto Sans TC', sans-serif;
      font-size: var(--f-body); font-weight: 500; letter-spacing: 0.04em;
      box-shadow: 0 4px 20px rgba(0,0,0,0.25);
      transition: all 0.2s;
    }
    .quiz-fab:hover { background: #333; transform: translateY(-2px); box-shadow: 0 6px 24px rgba(0,0,0,0.3); }
    .quiz-fab-ico { font-size: 18px; }

    /* âââ QUIZ MODAL âââââââââââââââââââââââââââ */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(26,26,26,0.55); backdrop-filter: blur(4px);
      z-index: 300; display: flex; align-items: center; justify-content: center;
      padding: 24px; opacity: 0; pointer-events: none; transition: opacity 0.25s;
    }
    .modal-overlay.open { opacity: 1; pointer-events: all; }

    .modal {
      background: var(--paper); border: 1px solid var(--rule);
      border-radius: 4px; padding: 36px;
      max-width: 520px; width: 100%; max-height: 88vh; overflow-y: auto;
      transform: translateY(16px); transition: transform 0.25s; position: relative;
    }
    .modal-overlay.open .modal { transform: translateY(0); }

    .modal-close {
      position: absolute; top: 16px; right: 18px;
      background: none; border: none; font-size: 22px;
      cursor: pointer; color: var(--ink-faint); transition: color 0.15s;
    }
    .modal-close:hover { color: var(--ink); }

    .modal-kicker { font-size: var(--f-deco); letter-spacing: 0.2em; text-transform: uppercase; color: var(--ink-faint); margin-bottom: 8px; }
    .modal-title  { font-family: 'Noto Serif TC', serif; font-size: var(--f-hero); font-weight: 700; line-height: 1.3; margin-bottom: 8px; }
    .modal-sub    { font-size: var(--f-body); color: var(--ink-light); line-height: 1.75; margin-bottom: 28px; }

    /* Progress */
    .quiz-prog-lbl  { font-size: var(--f-meta); color: var(--ink-faint); text-align: right; margin-bottom: 8px; }
    .quiz-prog-bar  { height: 3px; background: var(--rule); border-radius: 2px; margin-bottom: 28px; overflow: hidden; }
    .quiz-prog-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.4s ease; }

    /* Question */
    .quiz-q-num  { font-size: var(--f-deco); letter-spacing: 0.2em; text-transform: uppercase; color: var(--accent-dark); margin-bottom: 10px; font-weight: 500; }
    .quiz-q-txt  { font-family: 'Noto Serif TC', serif; font-size: var(--f-sub); font-weight: 500; line-height: 1.6; margin-bottom: 6px; }
    .quiz-eg-box {
      background: var(--paper-warm); border-left: 3px solid var(--accent);
      padding: 14px 18px; font-size: var(--f-body); color: var(--ink-light);
      font-style: italic; line-height: 1.8; margin-bottom: 24px;
    }
    .quiz-opts { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
    .quiz-opt {
      padding: 14px 18px; border: 1.5px solid var(--rule);
      background: white; border-radius: 3px; cursor: pointer;
      font-family: 'Noto Sans TC', sans-serif; font-size: var(--f-body);
      color: var(--ink); text-align: left; transition: all 0.18s; font-weight: 400; line-height: 1.5;
    }
    .quiz-opt:hover:not(:disabled) { border-color: var(--accent); background: var(--highlight); }
    .quiz-opt.correct { border-color: #2d6a2d; background: #e8f5e8; color: #2d6a2d; font-weight: 500; }
    .quiz-opt.wrong   { border-color: #a03030; background: #fde8e8; color: #a03030; }
    .quiz-opt:disabled { cursor: default; }

    .quiz-fb {
      display: none; padding: 14px 16px; border-radius: 3px;
      font-size: var(--f-body); line-height: 1.75; margin-bottom: 20px;
    }
    .quiz-fb.show  { display: block; }
    .quiz-fb.ok    { background: #e8f5e8; color: #2d6a2d; border: 1px solid #b8d4b8; }
    .quiz-fb.fail  { background: #fde8e8; color: #a03030; border: 1px solid #d4b8b8; }

    .quiz-next {
      width: 100%; padding: 14px; background: var(--ink); color: var(--paper);
      border: none; border-radius: 3px;
      font-family: 'Noto Sans TC', sans-serif; font-size: var(--f-body);
      font-weight: 500; cursor: pointer; transition: background 0.18s; display: none;
    }
    .quiz-next.show { display: block; }
    .quiz-next:hover { background: #333; }

    /* Result */
    .quiz-result { text-align: center; padding: 16px 0; }
    .quiz-emoji  { font-size: 64px; margin-bottom: 10px; }
    .quiz-score  { font-family: 'DM Serif Display', serif; font-size: 56px; line-height: 1; color: var(--ink); margin-bottom: 4px; }
    .quiz-score-lbl { font-size: var(--f-sub); color: var(--ink-light); margin-bottom: 20px; }
    .quiz-result-msg { font-size: var(--f-md); line-height: 1.85; color: var(--ink); margin-bottom: 28px; }
    .quiz-result-btns { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
    .btn-outline {
      padding: 12px 28px; border: 1.5px solid var(--ink); background: transparent;
      border-radius: 3px; font-family: inherit; font-size: var(--f-body);
      cursor: pointer; transition: all 0.18s;
    }
    .btn-outline:hover { background: var(--ink); color: var(--paper); }
    .btn-solid {
      padding: 12px 28px; border: none; background: var(--ink); color: var(--paper);

function setupReveal(){
  const obs = new IntersectionObserver((entries)=>{
    entries.forEach(e=>{ if(e.isIntersecting){ e.target.classList.add('in'); obs.unobserve(e.target); } });
  },{ threshold:0.06 });
  document.querySelectorAll('.reveal').forEach(el=>{ el.classList.remove('in'); obs.observe(el); });
}

function shuffle(a){
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}
