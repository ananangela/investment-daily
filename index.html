<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>投資日報 · 每日一則</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans TC', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
    }
    .container {
      text-align: center;
      padding: 2rem;
      max-width: 600px;
    }
    h1 {
      font-size: 3.5rem;
      margin-bottom: 1rem;
      font-weight: 700;
    }
    .subtitle {
      font-size: 1.2rem;
      margin-bottom: 2rem;
      opacity: 0.95;
    }
    .description {
      font-size: 1rem;
      margin-bottom: 3rem;
      line-height: 1.6;
      opacity: 0.9;
    }
    .button {
      display: inline-block;
      padding: 1rem 2rem;
      background: white;
      color: #667eea;
      text-decoration: none;
      border-radius: 0.5rem;
      font-weight: 600;
      font-size: 1.1rem;
      transition: all 0.3s ease;
      margin: 0.5rem;
    }
    .button:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(0,0,0,0.2);
    }
    .features {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.5rem;
      margin-top: 3rem;
      text-align: left;
    }
    .feature {
      background: rgba(255,255,255,0.1);
      padding: 1.5rem;
      border-radius: 0.5rem;
      backdrop-filter: blur(10px);
    }
    .feature h3 {
      margin-bottom: 0.5rem;
      font-size: 1.1rem;
    }
    .feature p {
      font-size: 0.9rem;
      opacity: 0.85;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>📰 投資日報</h1>
    <p class="subtitle">每天一則台股投資新聞，適合初學者</p>

    <p class="description">
      由 Claude AI 自動搜尋、分析、撰寫，每天早上 8 點自動更新。
      包含新聞分析、重點整理、專有名詞解釋。
    </p>

    <a href="./investment-daily.html" class="button">📖 閱讀今日投資日報</a>

    <div class="features">
      <div class="feature">
        <h3>🤖 AI 自動生成</h3>
        <p>每天自動搜尋最新台股新聞，挑選最適合初學者的內容</p>
      </div>
      <div class="feature">
        <h3>⏰ 每日更新</h3>
        <p>台北時間每天早上 8 點自動發布新文章</p>
      </div>
      <div class="feature">
        <h3>🎓 初學者友善</h3>
        <p>深入淺出的分析，帶你認識股市術語與概念</p>
      </div>
      <div class="feature">
        <h3>📚 詞彙解釋</h3>
        <p>每篇文章包含 5+ 個重要投資概念的完整解說</p>
      </div>
    </div>
  </div>
</body>
</html>
