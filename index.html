<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>投資日報 · 每日一則</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;500;700&family=Noto+Sans+TC:wght@300;400;500&family=DM+Serif+Display&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --ink:              #1a1a1a;
      --ink-light:        #4a4a4a;
      --ink-faint:        #888;
      --paper:            #faf9f6;
      --paper-warm:       #f3f0e8;
      --rule:             #d4cfc4;
      --accent:           #c8a96e;
      --accent-dark:      #a07840;
      --tag-stock-bg:     #e8f0e8;
      --tag-stock-fg:     #2d6a2d;
      --tag-etf-bg:       #e8ecf4;
      --tag-etf-fg:       #1e3a6e;
      --tag-industry-bg:  #f4ece8;
      --tag-industry-fg:  #6e2e1e;
      --highlight:        #fffbe6;

      /* Font scale — 16px is the absolute floor for readable content */
      --f-deco:  13px;   /* purely ornamental: volume tag, separator labels   */
      --f-meta:  14px;   /* timestamps, chips, nav, tags, footer disclaimer   */
      --f-body:  16px;   /* body text baseline                                */
      --f-md:    17px;   /* article deck, descriptions                        */
      --f-sub:   20px;   /* sub-headlines, section titles                     */
      --f-head:  26px;   /* archive card headlines                            */
      --f-hero:  34px;   /* featured article headline                         */
      --f-date:  52px;   /* date numeral in navigator                         */
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      background: var(--paper);
      color: var(--ink);
      font-family: 'Noto Sans TC', sans-serif;
      font-weight: 300;
      font-size: var(--f-body);
      line-height: 1.8;
      min-height: 100vh;
    }

    /* ─── MASTHEAD ──────────────────────────── */
    .masthead {
      border-bottom: 3px double var(--ink);
      padding: 36px 0 22px;
      text-align: center;
    }
    .masthead-vol {
      font-size: var(--f-deco);
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--ink-faint);
      margin-bottom: 12px;
    }
    .masthead-title {
      font-family: 'DM Serif Display', 'Noto Serif TC', serif;
      font-size: clamp(42px, 9vw, 72px);
      font-weight: 400;
      letter-spacing: -0.02em;
      line-height: 1;
      margin-bottom: 10px;
    }
    .masthead-title em { font-style: normal; color: var(--accent-dark); }
    .masthead-tagline {
      font-size: var(--f-meta);
      letter-spacing: 0.22em;
      color: var(--ink-light);
      text-transform: uppercase;
    }
    .masthead-orn {
      display: flex; align-items: center; gap: 16px;
      padding: 14px 48px 0; justify-content: center;
    }
    .masthead-orn-line { flex: 1; max-width: 100px; height: 1px; background: var(--rule); }
    .masthead-orn span { font-size: var(--f-deco); color: var(--accent); letter-spacing: 0.4em; }

    /* ─── NAV STRIP ─────────────────────────── */
    .nav-strip {
      border-bottom: 1px solid var(--rule);
      padding: 12px 0;
      background: var(--paper);
      position: sticky; top: 0; z-index: 50;
    }
    .container { max-width: 900px; margin: 0 auto; padding: 0 24px; }
    .nav-inner {
      display: flex; gap: 8px; align-items: center;
      overflow-x: auto; scrollbar-width: none;
    }
    .nav-inner::-webkit-scrollbar { display: none; }
    .nav-label {
      font-size: var(--f-deco);
      letter-spacing: 0.18em; text-transform: uppercase;
      color: var(--ink-faint); white-space: nowrap; flex-shrink: 0;
    }
    .nav-chip {
      padding: 5px 16px; border-radius: 20px;
      font-size: var(--f-meta); white-space: nowrap;
      cursor: pointer; border: 1px solid transparent;
      transition: all 0.2s; text-decoration: none; font-weight: 400;
      background: none; font-family: inherit;
    }
    .nav-chip.all      { background: var(--ink); color: var(--paper); }
    .nav-chip.stock    { background: var(--tag-stock-bg); color: var(--tag-stock-fg); border-color: #b8d4b8; }
    .nav-chip.etf      { background: var(--tag-etf-bg);   color: var(--tag-etf-fg);   border-color: #b8c4d8; }
    .nav-chip.industry { background: var(--tag-industry-bg); color: var(--tag-industry-fg); border-color: #d4b8ac; }
    .nav-chip:hover { filter: brightness(0.94); }
    /* Active state: thicker border + slight shadow to signal selection */
    .nav-chip.chip-active { box-shadow: 0 0 0 2px var(--ink); font-weight: 500; }
    .nav-chip.all.chip-active { box-shadow: 0 0 0 2px #555; }

    /* ─── DAY NAVIGATOR ─────────────────────── */
    .day-nav {
      display: flex; align-items: center;
      justify-content: space-between; gap: 16px;
      padding: 36px 0 26px;
      border-bottom: 1px solid var(--rule);
      margin-bottom: 40px;
    }
    .day-nav-btn {
      display: flex; align-items: center; gap: 8px;
      padding: 10px 18px;
      border: 1px solid var(--rule); background: white;
      cursor: pointer; font-size: var(--f-meta);
      color: var(--ink-light); font-family: inherit;
      letter-spacing: 0.06em; transition: all 0.18s;
      border-radius: 2px; white-space: nowrap;
    }
    .day-nav-btn:hover:not(:disabled) { background: var(--ink); color: var(--paper); border-color: var(--ink); }
    .day-nav-btn:disabled { opacity: 0.3; cursor: default; }
    .day-nav-center { text-align: center; }
    .day-nav-big {
      font-family: 'DM Serif Display', serif;
      font-size: var(--f-date); line-height: 1; font-weight: 400;
    }
    .day-nav-weekday {
      font-family: 'Noto Serif TC', serif;
      font-size: var(--f-sub); font-weight: 500; color: var(--ink);
    }
    .day-nav-month { font-size: var(--f-meta); color: var(--ink-faint); letter-spacing: 0.08em; margin-top: 4px; }
    .today-pill {
      display: inline-block;
      background: var(--accent); color: white;
      font-size: var(--f-deco); letter-spacing: 0.12em;
      padding: 2px 10px; border-radius: 2px; margin-top: 6px; font-weight: 500;
    }

    /* ─── ARTICLE AREA ──────────────────────── */
    #article-wrap { transition: opacity 0.25s ease, transform 0.25s ease; }
    #article-wrap.fading { opacity: 0; transform: translateY(8px); }

    .article-kicker {
      display: flex; align-items: center; gap: 10px; margin-bottom: 14px;
    }
    .kicker-txt {
      font-size: var(--f-deco); letter-spacing: 0.24em;
      text-transform: uppercase; color: var(--accent-dark); font-weight: 500;
    }
    .kicker-line { width: 36px; height: 1px; background: var(--accent); }

    .article-headline {
      font-family: 'Noto Serif TC', serif;
      font-size: clamp(22px, 4vw, var(--f-hero));
      font-weight: 700; line-height: 1.4;
      margin-bottom: 14px; letter-spacing: -0.01em;
    }
    .article-deck {
      font-size: var(--f-md); color: var(--ink-light); line-height: 1.8; margin-bottom: 18px;
    }
    .article-meta {
      display: flex; align-items: center; flex-wrap: wrap;
      gap: 12px; font-size: var(--f-meta); color: var(--ink-faint); margin-bottom: 22px;
    }
    .meta-sep { color: var(--rule); }

    .tag-list { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 32px; }
    .tag {
      padding: 4px 12px; border-radius: 3px;
      font-size: var(--f-meta); font-weight: 500; letter-spacing: 0.04em;
    }
    .tag.stock    { background: var(--tag-stock-bg);    color: var(--tag-stock-fg); }
    .tag.etf      { background: var(--tag-etf-bg);      color: var(--tag-etf-fg); }
    .tag.industry { background: var(--tag-industry-bg); color: var(--tag-industry-fg); }

    /* ─── TWO-COL ────────────────────────────── */
    .two-col {
      display: grid; grid-template-columns: 1fr 1fr; gap: 24px; margin-bottom: 40px;
    }
    @media (max-width: 640px) { .two-col { grid-template-columns: 1fr; } }

    .section-block {
      background: white; border: 1px solid var(--rule);
      border-radius: 2px; padding: 24px; position: relative;
    }
    .section-block::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0;
      height: 3px; background: var(--ink); border-radius: 2px 2px 0 0;
    }
    .block-label {
      font-size: var(--f-deco); letter-spacing: 0.22em; text-transform: uppercase;
      color: var(--ink-faint); margin-bottom: 16px; font-weight: 500;
    }

    .summary-text {
      font-family: 'Noto Serif TC', serif; font-size: var(--f-body); line-height: 2;
    }
    .summary-text strong { font-weight: 700; border-bottom: 2px solid var(--accent); }

    .kp-list { list-style: none; display: flex; flex-direction: column; gap: 14px; }
    .kp-item { display: flex; gap: 12px; align-items: flex-start; }
    .kp-num {
      flex-shrink: 0; width: 24px; height: 24px;
      background: var(--ink); color: var(--paper);
      border-radius: 50%; display: flex; align-items: center; justify-content: center;
      font-size: var(--f-meta); font-weight: 500; margin-top: 2px;
    }
    .kp-txt { font-size: var(--f-body); line-height: 1.8; color: var(--ink-light); }

    /* ─── GLOSSARY ──────────────────────────── */
    .glossary-sec { margin-bottom: 40px; }
    .glossary-hd {
      display: flex; align-items: baseline; gap: 14px; margin-bottom: 20px;
    }
    .glossary-lbl {
      font-size: var(--f-deco); letter-spacing: 0.22em; text-transform: uppercase;
      color: var(--ink-faint); font-weight: 500; white-space: nowrap;
    }
    .glossary-rule { flex: 1; height: 1px; background: var(--rule); }
    .glossary-hint { font-size: var(--f-meta); color: var(--ink-faint); white-space: nowrap; }
    .glossary-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(230px, 1fr)); gap: 12px;
    }

    .term-card {
      background: white; border: 1px solid var(--rule);
      border-radius: 2px; padding: 20px; cursor: pointer;
      transition: box-shadow 0.22s, transform 0.22s; position: relative; overflow: hidden;
    }
    .term-card::after {
      content: ''; position: absolute; bottom: 0; left: 0; right: 0;
      height: 2px; background: var(--accent);
      transform: scaleX(0); transition: transform 0.22s; transform-origin: left;
    }
    .term-card:hover { box-shadow: 0 4px 18px rgba(0,0,0,0.08); transform: translateY(-2px); }
    .term-card:hover::after, .term-card.open::after { transform: scaleX(1); }
    .term-card.open { background: var(--highlight); border-color: var(--accent); }

    .term-name { font-family: 'Noto Serif TC', serif; font-size: var(--f-sub); font-weight: 700; margin-bottom: 3px; }
    .term-en { font-family: 'Inter', sans-serif; font-size: var(--f-deco); letter-spacing: 0.1em; color: var(--ink-faint); text-transform: uppercase; margin-bottom: 12px; }
    .term-short { font-size: var(--f-body); color: var(--ink-light); line-height: 1.7; }
    .term-card:not(.open) .term-short {
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
    }
    .term-full { display: none; margin-top: 14px; padding-top: 14px; border-top: 1px dashed var(--rule); }
    .term-card.open .term-full { display: block; }
    .term-full-txt { font-size: var(--f-body); line-height: 1.85; color: var(--ink); }
    .term-eg {
      margin-top: 10px; padding: 10px 14px;
      background: var(--paper-warm); border-left: 3px solid var(--accent);
      font-size: var(--f-body); color: var(--ink-light); font-style: italic; line-height: 1.75;
    }
    .term-hint {
      font-size: var(--f-deco); color: var(--accent-dark);
      margin-top: 10px; text-align: right; letter-spacing: 0.08em;
    }
    .term-card.open .term-hint { display: none; }

    /* ─── DIVIDER ────────────────────────────── */
    .orn { display: flex; align-items: center; gap: 18px; margin: 40px 0; }
    .orn-line { flex: 1; height: 1px; background: var(--rule); }
    .orn-sym { color: var(--accent); font-size: var(--f-meta); letter-spacing: 0.3em; }

    /* ─── ARCHIVE ────────────────────────────── */
    .archive-sec { margin-bottom: 60px; }
    .archive-hd { display: flex; align-items: baseline; gap: 14px; margin-bottom: 24px; }
    .archive-title { font-family: 'Noto Serif TC', serif; font-size: var(--f-sub); font-weight: 700; }
    .archive-rule { flex: 1; height: 1px; background: var(--rule); }

    .archive-list { display: flex; flex-direction: column; }
    .archive-card {
      display: grid; grid-template-columns: 1fr auto; gap: 20px;
      align-items: start; padding: 22px 0;
      border-bottom: 1px solid var(--rule);
      cursor: pointer; transition: background 0.15s, margin 0.15s, padding 0.15s;
      border-radius: 2px; text-decoration: none; color: inherit;
    }
    .archive-card:hover { background: white; margin: 0 -18px; padding: 22px 18px; }
    .archive-card-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; }
    .archive-card-hl {
      font-family: 'Noto Serif TC', serif;
      font-size: var(--f-head); font-weight: 500; line-height: 1.45; margin-bottom: 8px;
    }
    .archive-card-deck { font-size: var(--f-body); color: var(--ink-light); line-height: 1.7; }
    .archive-card-meta { display: flex; flex-direction: column; align-items: flex-end; gap: 8px; flex-shrink: 0; }
    .archive-card-date { font-size: var(--f-meta); color: var(--ink-faint); }
    .diff {
      display: inline-flex; align-items: center;
      padding: 3px 10px; border-radius: 3px; font-size: var(--f-meta); font-weight: 500;
    }
    .diff.beginner    { background: #e8f5e8; color: #2d6a2d; }
    .diff.intermediate { background: #fff3e0; color: #8a4500; }

    /* ─── QUIZ FAB ───────────────────────────── */
    .quiz-fab {
      position: fixed; bottom: 32px; right: 28px; z-index: 200;
      display: flex; align-items: center; gap: 8px;
      padding: 14px 22px;
      background: var(--ink); color: var(--paper);
      border: none; border-radius: 40px; cursor: pointer;
      font-family: 'Noto Sans TC', sans-serif;
      font-size: var(--f-body); font-weight: 500; letter-spacing: 0.04em;
      box-shadow: 0 4px 20px rgba(0,0,0,0.25);
      transition: all 0.2s;
    }
    .quiz-fab:hover { background: #333; transform: translateY(-2px); box-shadow: 0 6px 24px rgba(0,0,0,0.3); }
    .quiz-fab-ico { font-size: 18px; }

    /* ─── QUIZ MODAL ─────────────────────────── */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(26,26,26,0.55); backdrop-filter: blur(4px);
      z-index: 300; display: flex; align-items: center; justify-content: center;
      padding: 24px; opacity: 0; pointer-events: none; transition: opacity 0.25s;
    }
    .modal-overlay.open { opacity: 1; pointer-events: all; }

    .modal {
      background: var(--paper); border: 1px solid var(--rule);
      border-radius: 4px; padding: 36px;
      max-width: 520px; width: 100%; max-height: 88vh; overflow-y: auto;
      transform: translateY(16px); transition: transform 0.25s; position: relative;
    }
    .modal-overlay.open .modal { transform: translateY(0); }

    .modal-close {
      position: absolute; top: 16px; right: 18px;
      background: none; border: none; font-size: 22px;
      cursor: pointer; color: var(--ink-faint); transition: color 0.15s;
    }
    .modal-close:hover { color: var(--ink); }

    .modal-kicker { font-size: var(--f-deco); letter-spacing: 0.2em; text-transform: uppercase; color: var(--ink-faint); margin-bottom: 8px; }
    .modal-title  { font-family: 'Noto Serif TC', serif; font-size: var(--f-hero); font-weight: 700; line-height: 1.3; margin-bottom: 8px; }
    .modal-sub    { font-size: var(--f-body); color: var(--ink-light); line-height: 1.75; margin-bottom: 28px; }

    /* Progress */
    .quiz-prog-lbl  { font-size: var(--f-meta); color: var(--ink-faint); text-align: right; margin-bottom: 8px; }
    .quiz-prog-bar  { height: 3px; background: var(--rule); border-radius: 2px; margin-bottom: 28px; overflow: hidden; }
    .quiz-prog-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.4s ease; }

    /* Question */
    .quiz-q-num  { font-size: var(--f-deco); letter-spacing: 0.2em; text-transform: uppercase; color: var(--accent-dark); margin-bottom: 10px; font-weight: 500; }
    .quiz-q-txt  { font-family: 'Noto Serif TC', serif; font-size: var(--f-sub); font-weight: 500; line-height: 1.6; margin-bottom: 6px; }
    .quiz-eg-box {
      background: var(--paper-warm); border-left: 3px solid var(--accent);
      padding: 14px 18px; font-size: var(--f-body); color: var(--ink-light);
      font-style: italic; line-height: 1.8; margin-bottom: 24px;
    }
    .quiz-opts { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
    .quiz-opt {
      padding: 14px 18px; border: 1.5px solid var(--rule);
      background: white; border-radius: 3px; cursor: pointer;
      font-family: 'Noto Sans TC', sans-serif; font-size: var(--f-body);
      color: var(--ink); text-align: left; transition: all 0.18s; font-weight: 400; line-height: 1.5;
    }
    .quiz-opt:hover:not(:disabled) { border-color: var(--accent); background: var(--highlight); }
    .quiz-opt.correct { border-color: #2d6a2d; background: #e8f5e8; color: #2d6a2d; font-weight: 500; }
    .quiz-opt.wrong   { border-color: #a03030; background: #fde8e8; color: #a03030; }
    .quiz-opt:disabled { cursor: default; }

    .quiz-fb {
      display: none; padding: 14px 16px; border-radius: 3px;
      font-size: var(--f-body); line-height: 1.75; margin-bottom: 20px;
    }
    .quiz-fb.show  { display: block; }
    .quiz-fb.ok    { background: #e8f5e8; color: #2d6a2d; border: 1px solid #b8d4b8; }
    .quiz-fb.fail  { background: #fde8e8; color: #a03030; border: 1px solid #d4b8b8; }

    .quiz-next {
      width: 100%; padding: 14px; background: var(--ink); color: var(--paper);
      border: none; border-radius: 3px;
      font-family: 'Noto Sans TC', sans-serif; font-size: var(--f-body);
      font-weight: 500; cursor: pointer; transition: background 0.18s; display: none;
    }
    .quiz-next.show { display: block; }
    .quiz-next:hover { background: #333; }

    /* Result */
    .quiz-result { text-align: center; padding: 16px 0; }
    .quiz-emoji  { font-size: 64px; margin-bottom: 10px; }
    .quiz-score  { font-family: 'DM Serif Display', serif; font-size: 56px; line-height: 1; color: var(--ink); margin-bottom: 4px; }
    .quiz-score-lbl { font-size: var(--f-sub); color: var(--ink-light); margin-bottom: 20px; }
    .quiz-result-msg { font-size: var(--f-md); line-height: 1.85; color: var(--ink); margin-bottom: 28px; }
    .quiz-result-btns { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
    .btn-outline {
      padding: 12px 28px; border: 1.5px solid var(--ink); background: transparent;
      border-radius: 3px; font-family: inherit; font-size: var(--f-body);
      cursor: pointer; transition: all 0.18s;
    }
    .btn-outline:hover { background: var(--ink); color: var(--paper); }
    .btn-solid {
      padding: 12px 28px; border: none; background: var(--ink); color: var(--paper);
      border-radius: 3px; font-family: inherit; font-size: var(--f-body);
      cursor: pointer; transition: background 0.18s;
    }
    .btn-solid:hover { background: #333; }

    /* ─── FOOTER ─────────────────────────────── */
    footer { border-top: 3px double var(--ink); padding: 32px 0; margin-top: 20px; }
    .footer-inner {
      display: flex; justify-content: space-between;
      align-items: flex-start; flex-wrap: wrap; gap: 20px;
    }
    .footer-brand { font-family: 'DM Serif Display', serif; font-size: 26px; }
    .footer-brand em { font-style: normal; color: var(--accent-dark); }
    .footer-note { font-size: var(--f-meta); color: var(--ink-faint); text-align: right; line-height: 1.75; }

    /* ─── SCROLL REVEAL ─────────────────────── */
    .reveal { opacity: 0; transform: translateY(16px); transition: opacity 0.45s ease, transform 0.45s ease; }
    .reveal.in { opacity: 1; transform: none; }

    @media (max-width: 520px) {
      .modal { padding: 24px 18px; }
      .day-nav-btn .btn-label { display: none; }
    }
  </style>
</head>
<body>

<!-- ─── MASTHEAD ─── -->
<header class="masthead">
  <div class="masthead-vol">Vol. I · 投資小白的每日讀本</div>
  <h1 class="masthead-title">投資<em>日報</em></h1>
  <p class="masthead-tagline">Daily Investment Intelligence · For Beginners</p>
  <div class="masthead-orn">
    <div class="masthead-orn-line"></div>
    <span>✦</span>
    <div class="masthead-orn-line"></div>
  </div>
</header>

<!-- ─── NAV ─── -->
<nav class="nav-strip">
  <div class="container">
    <div class="nav-inner">
      <span class="nav-label">篩選往期</span>
      <button class="nav-chip all chip-active" id="chip-all"      onclick="setFilter('all')">全部</button>
      <button class="nav-chip stock"           id="chip-stock"    onclick="setFilter('stock')">📈 個股</button>
      <button class="nav-chip etf"             id="chip-etf"      onclick="setFilter('etf')">🗂 ETF</button>
      <button class="nav-chip industry"        id="chip-industry" onclick="setFilter('industry')">🏭 產業</button>
    </div>
  </div>
</nav>

<main>
  <div class="container">

        eg:"就像餐廳原本跟食材供應商說要買 100 顆蛋，但生意不好改成只買 70 顆，供應商因此少了 30 顆的收入。" },
      { name:"滲透率", en:"Penetration Rate",
        short:"某種新技術或產品在市場中所佔的銷售比例，用來衡量一項技術是否已進入主流市場。",
        full:"滲透率指某類產品（如電動車）佔整體市場（所有新車銷售）的比例。例如「全球電動車滲透率達 18%」，意思是每賣出 100 輛新車，有 18 輛是電動車。滲透率越高代表市場越成熟。",
        eg:"就像智慧型手機當年逐漸取代傳統手機，剛開始只有少數人用，後來幾乎人手一支。" },
      { name:"庫存去化", en:"Inventory Destocking",
        short:"廠商將手上積壓的商品賣出以降低庫存水位的過程，期間通常會暫停或減少新採購。",
        full:"「庫存去化」是指廠商將過多的存貨透過銷售慢慢消耗的過程。在去化期間，廠商通常不會下新訂單，對上游供應商形成壓力。去化完成後，訂單才會重新回升。",
        eg:"就像家裡屯了太多衛生紙，要等用完才會再去買，在這段期間賣場（供應商）就沒有生意。" },
      { name:"IGBT", en:"Insulated Gate Bipolar Transistor",
        short:"電動車電控系統的核心零件，功能是控制馬達的電流與轉速，決定車輛動力表現。",
        full:"IGBT（絕緣柵雙極電晶體）是電動車驅動系統中最關鍵的功率半導體元件，負責控制電流開關，讓電池電力高效轉換為馬達動力。一輛電動車通常需要數十到上百顆 IGBT。",
        eg:"IGBT 就像電動車的油門踏板背後的精密控制器，決定要給馬達多少電、何時給、如何給。" }
    ]
  }
};

/* ═══════════════════════════════════════════
   STATE
═══════════════════════════════════════════ */
let currentDay    = TODAY;
let currentFilter = 'all';      // 'all' | 'stock' | 'etf' | 'industry'
let quizState     = { qs:[], cur:0, score:0 };

/* ═══════════════════════════════════════════
   DATE HELPERS
═══════════════════════════════════════════ */
const WD = ['星期日','星期一','星期二','星期三','星期四','星期五','星期六'];
function pd(s){ const [y,m,d]=s.split('-').map(Number); return new Date(y,m-1,d); }
function fmtShort(s){ const d=pd(s); return `${d.getMonth()+1}/${d.getDate()}`; }

/* ═══════════════════════════════════════════
   RENDER DAY
═══════════════════════════════════════════ */
function renderDay(key, anim=true){
  currentDay = key;
  const d    = DATA[key];
  const idx  = DAYS.indexOf(key);
  const date = pd(key);
  const isToday = key === TODAY;

  // Update navigator UI
  document.getElementById('nav-day').textContent = date.getDate();
  document.getElementById('nav-wd').textContent  = WD[date.getDay()];
  document.getElementById('nav-ym').textContent  = `${date.getFullYear()}年 ${date.getMonth()+1}月`;
  document.getElementById('today-pill').style.display = isToday ? 'inline-block' : 'none';
  document.getElementById('btn-prev').disabled = idx === 0;
  document.getElementById('btn-next').disabled = idx === DAYS.length-1;

  // Quiz FAB — only show if a previous day exists
  document.getElementById('quiz-fab').style.display = (idx > 0) ? 'flex' : 'none';

  // Render article with optional fade transition
  const wrap = document.getElementById('article-wrap');
  const doRender = () => {
    wrap.innerHTML = buildHTML(d, key);
    setupReveal();
    if (anim) { wrap.classList.remove('fading'); }
  };
  if (anim){
    wrap.classList.add('fading');
    setTimeout(doRender, 240);
  } else {
    doRender();
  }
}

/* ─── BUILD ARTICLE HTML ─── */
function buildHTML(d, key){
  const tagsHTML = d.tags.map(t=>`<span class="tag ${t.t}">${t.l}</span>`).join('');
  const kpHTML   = d.keypoints.map((k,i)=>`
    <li class="kp-item">
      <span class="kp-num">${i+1}</span>
      <span class="kp-txt">${k}</span>
    </li>`).join('');
  const termsHTML = d.terms.map(t=>`
    <div class="term-card" onclick="toggleTerm(this)">
      <div class="term-name">${t.name}</div>
      <div class="term-en">${t.en}</div>
      <div class="term-short">${t.short}</div>
      <div class="term-full">
        <p class="term-full-txt">${t.full}</p>
        <div class="term-eg">💡 ${t.eg}</div>
      </div>
      <div class="term-hint">↓ 點擊展開</div>
    </div>`).join('');

  // Archive cards — delegated to shared function so filter can update them independently
  const archiveHTML = buildArchiveCards(key);

  return `
    <article class="reveal">
      <div class="article-kicker">
        <span class="kicker-txt">今日精選</span>
        <span class="kicker-line"></span>
      </div>
      <h2 class="article-headline">${d.headline}</h2>
      <p class="article-deck">${d.deck}</p>
      <div class="article-meta">
        <span>來源：${d.source}</span>
        <span class="meta-sep">·</span>
        <span>${fmtShort(key)}</span>
        <span class="meta-sep">·</span>
        <span>⏱ 閱讀約 ${d.readingTime} 分鐘</span>
      </div>
      <div class="tag-list">${tagsHTML}</div>
      <div class="two-col">
        <div class="section-block">
          <div class="block-label">文章摘要</div>
          <p class="summary-text">${d.summary}</p>
        </div>
        <div class="section-block">
          <div class="block-label">三大重點</div>
          <ul class="kp-list">${kpHTML}</ul>
        </div>
      </div>
    </article>

    <div class="glossary-sec reveal">
      <div class="glossary-hd">
        <span class="glossary-lbl">📖 今日名詞解釋</span>
        <div class="glossary-rule"></div>
        <span class="glossary-hint">點卡片查看說明</span>
      </div>
      <div class="glossary-grid">${termsHTML}</div>
    </div>

    <div class="orn reveal">
      <div class="orn-line"></div>
      <span class="orn-sym">✦ ✦ ✦</span>
      <div class="orn-line"></div>
    </div>

    <div class="archive-sec reveal">
      <div class="archive-hd">
        <h3 class="archive-title">往期文章</h3>
        <div class="archive-rule"></div>
      </div>
      <div class="archive-list">${archiveHTML}</div>
    </div>`;
}

/* ═══════════════════════════════════════════
   ARCHIVE FILTER
═══════════════════════════════════════════ */

/** Build archive card HTML respecting currentFilter & excluding exceptKey */
function buildArchiveCards(exceptKey){
  const filtered = [...DAYS].reverse()
    .filter(k => k !== exceptKey)
    .filter(k => currentFilter === 'all' || DATA[k].tags.some(t => t.t === currentFilter));

  if (!filtered.length){
    const labels = { stock:'個股', etf:'ETF', industry:'產業' };
    return `<div style="padding:32px 0; color:var(--ink-faint); font-size:var(--f-body); text-align:center;">
      目前存檔中還沒有「${labels[currentFilter]}」類別的文章。
    </div>`;
  }

  return filtered.map(k => {
    const a = DATA[k];
    const tagsRow = a.tags.slice(0,2).map(t=>`<span class="tag ${t.t}">${t.l}</span>`).join('');
    return `<div class="archive-card" onclick="navigate_to('${k}')">
      <div>
        <div class="archive-card-tags">${tagsRow}</div>
        <div class="archive-card-hl">${a.headline}</div>
        <div class="archive-card-deck">${a.deck}</div>
      </div>
      <div class="archive-card-meta">
        <span class="archive-card-date">${fmtShort(k)}</span>
        <span class="diff ${a.difficulty}">${a.difficultyLabel}</span>
      </div>
    </div>`;
  }).join('');
}

/** Update only the archive list in the DOM without re-rendering the full article */
function renderArchive(){
  const el = document.querySelector('.archive-list');
  if (el) el.innerHTML = buildArchiveCards(currentDay);
}

/** Switch active filter chip and refresh archive */
function setFilter(f){
  currentFilter = f;
  // Update chip active state
  ['all','stock','etf','industry'].forEach(id => {
    const chip = document.getElementById('chip-' + id);
    if (chip) chip.classList.toggle('chip-active', id === f);
  });
  renderArchive();
}

/* ═══════════════════════════════════════════
   NAVIGATION
═══════════════════════════════════════════ */
function navigate(dir){
  const i = DAYS.indexOf(currentDay) + dir;
  if (i >= 0 && i < DAYS.length){
    renderDay(DAYS[i]);
    window.scrollTo({ top:0, behavior:'smooth' });
  }
}
function navigate_to(key){
  renderDay(key);
  window.scrollTo({ top:0, behavior:'smooth' });
}

/* ═══════════════════════════════════════════
   TERM CARDS
═══════════════════════════════════════════ */
function toggleTerm(el){
  const was = el.classList.contains('open');
  document.querySelectorAll('.term-card').forEach(c=>c.classList.remove('open'));
  if (!was) el.classList.add('open');
}

/* ═══════════════════════════════════════════
   QUIZ
═══════════════════════════════════════════ */
function openQuiz(){
  const idx = DAYS.indexOf(currentDay);
  if (idx < 1) return;
  const prevKey  = DAYS[idx-1];
  const terms    = DATA[prevKey].terms;
  const allNames = Object.values(DATA).flatMap(d=>d.terms.map(t=>t.name));

  // Pick up to 3 random terms
  const selected = shuffle([...terms]).slice(0,3);
  quizState.qs = selected.map(term=>{
    const wrong   = shuffle(allNames.filter(n=>n!==term.name)).slice(0,3);
    const options = shuffle([term.name, ...wrong]);
    return { term, options, answered:false };
  });
  quizState.cur   = 0;
  quizState.score = 0;

  showQuestion();
  document.getElementById('modal-overlay').classList.add('open');
}
function closeQuiz(){ document.getElementById('modal-overlay').classList.remove('open'); }
function overlayClick(e){ if(e.target===document.getElementById('modal-overlay')) closeQuiz(); }

function showQuestion(){
  const { qs, cur } = quizState;
  if (cur >= qs.length){ showResult(); return; }

  const q   = qs[cur];
  const pct = Math.round(cur / qs.length * 100);
  const prevDate = fmtShort(DAYS[DAYS.indexOf(currentDay)-1]);

  document.getElementById('modal-body').innerHTML = `
    <div class="modal-kicker">昨日（${prevDate}）名詞測驗</div>
    <div class="modal-title">你還記得嗎？</div>
    <div class="modal-sub">根據以下白話描述，猜猜這是哪個投資名詞？</div>
    <div class="quiz-prog-lbl">第 ${cur+1} 題，共 ${qs.length} 題</div>
    <div class="quiz-prog-bar"><div class="quiz-prog-fill" style="width:${pct}%"></div></div>
    <div class="quiz-q-num">Question ${cur+1}</div>
    <div class="quiz-q-txt">這個白話比喻描述的是哪個名詞？</div>
    <div class="quiz-eg-box">💡 ${q.term.eg}</div>
    <div class="quiz-opts">
      ${q.options.map(opt=>`<button class="quiz-opt" onclick="answer(this,'${opt.replace(/'/g,"\\'")}','${q.term.name.replace(/'/g,"\\'")}')">
        ${opt}
      </button>`).join('')}
    </div>
    <div class="quiz-fb" id="qfb"></div>
    <button class="quiz-next" id="qnxt" onclick="nextQ()">
      ${cur+1 < qs.length ? '下一題 →' : '查看結果 →'}
    </button>`;
}

function answer(btn, selected, correct){
  if (quizState.qs[quizState.cur].answered) return;
  quizState.qs[quizState.cur].answered = true;
  const ok = selected === correct;
  if (ok) quizState.score++;

  document.querySelectorAll('.quiz-opt').forEach(b=>{
    b.disabled = true;
    if (b.textContent.trim() === correct)      b.classList.add('correct');
    else if (b === btn && !ok)                 b.classList.add('wrong');
  });

  const term = quizState.qs[quizState.cur].term;
  const fb   = document.getElementById('qfb');
  if (ok){
    fb.className = 'quiz-fb show ok';
    fb.innerHTML = `✅ 答對了！<br><strong>${term.name}</strong>：${term.short}`;
  } else {
    fb.className = 'quiz-fb show fail';
    fb.innerHTML = `❌ 答錯了，正確答案是 <strong>${correct}</strong>。<br>${term.short}`;
  }
  document.getElementById('qnxt').classList.add('show');
}

function nextQ(){ quizState.cur++; showQuestion(); }

function showResult(){
  const { score, qs } = quizState;
  const total = qs.length;
  const pct   = Math.round(score/total*100);
  const [emoji,msg] =
    pct===100 ? ['🏆','完美！三題全對，你已完全掌握這些名詞了 🎉'] :
    pct>=67   ? ['👍','答得不錯！再複習一下答錯的名詞，明天繼續挑戰。'] :
                ['📚','還有進步空間！建議回去翻閱昨日的名詞解釋卡，加深印象。'];

  document.getElementById('modal-body').innerHTML = `
    <div class="modal-kicker">測驗結果</div>
    <div class="modal-title">完成！</div>
    <div class="quiz-result">
      <div class="quiz-emoji">${emoji}</div>
      <div class="quiz-score">${score} <span style="font-size:28px;color:var(--ink-faint)">/ ${total}</span></div>
      <div class="quiz-score-lbl">答對題數</div>
      <div class="quiz-result-msg">${msg}</div>
      <div class="quiz-result-btns">
        <button class="btn-outline" onclick="retryQuiz()">再答一次</button>
        <button class="btn-solid"   onclick="closeQuiz()">關閉</button>
      </div>
    </div>`;
}

function retryQuiz(){
  quizState.cur = 0; quizState.score = 0;
  quizState.qs.forEach(q=>q.answered=false);
  showQuestion();
}

/* ═══════════════════════════════════════════
   SCROLL REVEAL
═══════════════════════════════════════════ */
function setupReveal(){
  const obs = new IntersectionObserver((entries)=>{
    entries.forEach(e=>{ if(e.isIntersecting){ e.target.classList.add('in'); obs.unobserve(e.target); } });
  },{ threshold:0.06 });
  document.querySelectorAll('.reveal').forEach(el=>{ el.classList.remove('in'); obs.observe(el); });
}

/* ═══════════════════════════════════════════
   UTILS
═══════════════════════════════════════════ */
function shuffle(a){
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}

/* ═══════════════════════════════════════════
   INIT
═══════════════════════════════════════════ */
renderDay(TODAY, false);
setTimeout(()=>{
  document.getElementById('day-nav').classList.add('in');
  setupReveal();
}, 40);
</script>
